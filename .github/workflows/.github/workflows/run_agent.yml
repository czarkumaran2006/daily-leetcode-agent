name: Daily LeetCode Agent

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at 00:00 UTC
  workflow_dispatch: # Allows manual triggering from the UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Agent Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTIFICATION_WEBHOOK: ${{ secrets.NOTIFICATION_WEBHOOK }}
      run: python agent.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "LeetCode Agent"
        git config --global user.email "agent@github.com"
        git add solutions/
        git diff-index --quiet HEAD || (git commit -m "Auto: Solved daily LeetCode problem" && git push)
